<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpertRoom — 专家头脑风暴</title>
  <link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body>

<!-- ── 顶栏 ─────────────────────────────────── -->
<div id="topbar">
  <h1>ExpertRoom</h1>
  <div id="room-meta">
    <div id="room-topic">— 暂无进行中的讨论 —</div>
    <div id="room-goal"></div>
  </div>
  <div id="progress-bar-wrap">
    <div id="progress-label">进度</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <button id="new-room-btn">＋ 新讨论</button>
  <button id="manage-agents-btn">⚙ 管理智能体</button>
</div>

<!-- ── 主布局 ─────────────────────────────────── -->
<div id="layout">

  <!-- 侧边栏：agent 状态 + 历史房间 -->
  <aside id="sidebar">
    <h2>参与者</h2>
    <div id="agent-list"></div>
    <div id="room-list-section">
      <h2>历史讨论</h2>
      <div id="history-rooms"></div>
    </div>
  </aside>

  <!-- 主区域：消息流 + 输入框 -->
  <div id="main-area">
    <div id="messages">
      <div class="system-msg" style="margin-top:60px">
        点击右上角「＋ 新讨论」开启一个头脑风暴
      </div>
    </div>
    <div id="input-area">
      <textarea id="user-input"
                placeholder="随时插话……（Enter 发送，Shift+Enter 换行）"
                rows="1"
                disabled></textarea>
      <button id="send-btn" disabled>发送</button>
    </div>
  </div>
</div>

<!-- ── 新建房间 Modal ─────────────────────────── -->
<div id="modal-overlay">
  <div id="modal">
    <h2>开启新讨论</h2>

    <div class="form-group">
      <label>话题 *</label>
      <input id="topic-input" type="text"
             placeholder="例如：AI agent 应该如何设计记忆系统？" />
    </div>

    <div class="form-group">
      <label>目标（可选）</label>
      <input id="goal-input" type="text"
             placeholder="例如：产出 5 个可执行 idea" />
    </div>

    <div class="form-group">
      <label>参与者</label>
      <div id="agent-checkboxes"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">取消</button>
      <button class="btn-create" id="modal-create">开始讨论</button>
    </div>
  </div>
</div>

<!-- ── Agent 管理 Modal ───────────────────────── -->
<div id="agent-modal-overlay">
  <div id="agent-modal">
    <div id="agent-modal-header">
      <h2 id="agent-modal-title">管理智能体</h2>
      <button id="agent-modal-close">✕</button>
    </div>

    <!-- 列表视图 -->
    <div id="agent-list-view">
      <div id="agent-cards"></div>
      <button id="add-agent-btn" class="btn-create">＋ 新建智能体</button>
    </div>

    <!-- 编辑/新建表单 -->
    <div id="agent-form-view" style="display:none">
      <div class="form-group">
        <label>ID（唯一标识，仅字母数字下划线）</label>
        <input id="af-id" type="text" placeholder="例如：lawyer" />
        <small id="af-id-note" style="color:var(--text-dim);font-size:11px"></small>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label>名称（显示用）</label>
          <input id="af-name" type="text" placeholder="例如：律师" />
        </div>
        <div class="form-group" style="width:80px">
          <label>头像 Emoji</label>
          <input id="af-avatar" type="text" placeholder="⚖️" maxlength="4" />
        </div>
      </div>
      <div class="form-group">
        <label>后端模型</label>
        <select id="af-backend">
          <option value="hermes">hermes（DeepSeek，推荐）</option>
          <option value="claude">claude（Claude）</option>
          <option value="codex">codex（GPT-5.5）</option>
          <option value="openclaw">openclaw（WSL）</option>
          <option value="mock">mock（测试用）</option>
        </select>
      </div>
      <div class="form-group">
        <label>身份定位</label>
        <input id="af-identity" type="text" placeholder="例如：法律顾问，擅长合规与风险评估" />
      </div>
      <div class="form-group">
        <label>专业领域</label>
        <input id="af-expertise" type="text" placeholder="例如：合同法、知识产权、公司治理" />
      </div>
      <div class="form-group">
        <label>性格特征（逗号分隔）</label>
        <input id="af-traits" type="text" placeholder="例如：严谨, 保守, 注重细节" />
      </div>
      <div class="form-group">
        <label>说话风格</label>
        <input id="af-tone" type="text" placeholder="例如：引用法条，喜欢追问「这件事合规吗」" />
      </div>
      <div class="form-group">
        <label>公开目标（逗号分隔）</label>
        <input id="af-goals" type="text" placeholder="例如：识别法律风险, 提供合规建议" />
      </div>
      <div class="form-group">
        <label>长期记忆 / 固有认知（逗号分隔）</label>
        <input id="af-memory" type="text" placeholder="例如：大多数创业失败源于合规疏忽" />
      </div>
      <div class="form-group">
        <label>
          <input id="af-enabled" type="checkbox" checked style="margin-right:6px" />
          启用此智能体
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="af-cancel">取消</button>
        <button class="btn-create" id="af-save">保存</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/app.js?v=2"></script>
</body>
</html>
